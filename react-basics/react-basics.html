    <script src="react-library/babel.js"></script>
    <script type="text/babel">
      const button = <button>submit</button>;
      const paragraph = <p>itid of text</p>;
      const div = (
        <div>

          <p>itid of text</p>
        </div>
      );
      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(div);
