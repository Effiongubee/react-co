<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color: rgb(4, 208, 4);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input {
        padding: 12px 15px;
        border-radius: 10px;
        font-size: 15px;
        border-width: 1px;
        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        margin-bottom: 50px;
      }

      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start;
      }

      .chat-message-text {
        background-color: rgb(221, 221, 221);
        padding: 12px 20px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-family: ;
        max-width: 300px;
      }
      .chat-message-robot {
        display: flex;
        align-items: start;
      }

      .img-robot {
        width: 30px;
      }

      .img-user {
        width: 50px;
      }

      .chat-messages-container {
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <!-- react is an external library and it also helps us create website easily-->
    <div class="js-container"></div>

    <script src="react-library/react.js"></script>
    <script src="react-library/react-dom.js"></script>

    <script src="react-library/chatbot.js"></script>

    <script src="react-library/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          setInputText("");
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="Send a massage to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            ></input>
            <button onClick={sendMessage} className="send-button">
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        // const massage = props.massage;
        //const sender = props.sender;
        //const {massage, sender} = props;

        /*
                if (sender === "robot") {
                  return (
                    <div>
                      <img src="bot.png" width="30" />
                      {massage}
                    </div>
                  );
                }
        */
        return (
          <div
            className={
              sender === "user" ? "chat-message-user" : "chat-message-robot"
            }
          >
            {sender === "robot" && <img src="bot.png" className="img-robot" />}
            <div className="chat-message-text">{message}</div>
            {sender === "user" && <img src="user.png" className="img-user" />}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);
        return (
          <div className="chat-messages-container" ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: "Hello Chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can i help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "What's today's date?",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is september 27th",
            sender: "robot",
            id: "id4",
          },
        ]);

        // const [chatMessages, setChatMessages] = array;
        // const chatMessages = array[0];
        // const setChatMessages = array[1];

        return (
          <div className="app-container">
            <ChatMessages chatMessages={chatMessages} />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);

      //Hooks lets us insert our react features into our components..
      //REACT HOOKS
      // useState ()
      //useRef ()
      //useEffect ()
      //and many more...
    </script>
  </body>
</html>
